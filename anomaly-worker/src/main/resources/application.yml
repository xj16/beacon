server:
  port: 8083

spring:
  application:
    name: beacon-anomaly-worker

beacon:
  elasticsearch:
    uri: ${ELASTICSEARCH_URI:http://localhost:9200}
    index: beacon-events
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    model: ${OLLAMA_MODEL:llama3.2}
    timeout-ms: 2500
  anomaly:
    interval-ms: 15000
    batch-size: 100

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
