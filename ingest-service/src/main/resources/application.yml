server:
  port: 8081
  # Bound request bodies so an oversized payload is rejected before it is buffered.
  max-http-request-header-size: 16KB
  tomcat:
    max-swallow-size: 2MB

spring:
  application:
    name: beacon-ingest
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${beacon.kafka.group-id:beacon-ingest}
      auto-offset-reset: earliest
      # Serializers/deserializers are configured explicitly in KafkaConfig so that the Jackson
      # ObjectMapper has the JavaTimeModule registered (LogEvent carries an Instant timestamp).
  servlet:
    multipart:
      max-request-size: 1MB

beacon:
  kafka:
    topic: ${BEACON_TOPIC:beacon.events}
    group-id: beacon-ingest
    partitions: 3
  elasticsearch:
    uri: ${ELASTICSEARCH_URI:http://localhost:9200}
    index: beacon-events
  ratelimit:
    # Max requests per client IP per minute on /api/**. Set to 0 to disable.
    per-minute: ${BEACON_RATELIMIT_PER_MINUTE:600}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
