services:
  # --- Kafka (KRaft mode, no ZooKeeper) ---------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: beacon-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "beacon-cluster-0000000000"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 12

  # --- Elasticsearch ----------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    container_name: beacon-elasticsearch
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12

  # --- Postgres (stores service metadata / alert rules) -----------------------
  postgres:
    image: postgres:16-alpine
    container_name: beacon-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: beacon
      POSTGRES_USER: beacon
      POSTGRES_PASSWORD: beacon
    volumes:
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beacon -d beacon"]
      interval: 10s
      timeout: 5s
      retries: 12

  # --- Kibana (optional UI for exploring the index) ---------------------------
  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.3
    container_name: beacon-kibana
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: "http://elasticsearch:9200"
    depends_on:
      elasticsearch:
        condition: service_healthy

  # --- Beacon services --------------------------------------------------------
  # One image per service, all built from the same multi-stage Dockerfile.
  ingest-service:
    build:
      context: .
      args:
        SERVICE: ingest-service
    image: beacon/ingest-service
    container_name: beacon-ingest
    ports:
      - "8081:8081"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      ELASTICSEARCH_URI: "http://elasticsearch:9200"
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  query-api:
    build:
      context: .
      args:
        SERVICE: query-api
    image: beacon/query-api
    container_name: beacon-query
    ports:
      - "8082:8082"
    environment:
      ELASTICSEARCH_URI: "http://elasticsearch:9200"
    depends_on:
      elasticsearch:
        condition: service_healthy

  anomaly-worker:
    build:
      context: .
      args:
        SERVICE: anomaly-worker
    image: beacon/anomaly-worker
    container_name: beacon-anomaly
    ports:
      - "8083:8083"
    environment:
      ELASTICSEARCH_URI: "http://elasticsearch:9200"
      # Use the real Postgres metadata store instead of the embedded H2 default.
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/beacon"
      SPRING_DATASOURCE_USERNAME: "beacon"
      SPRING_DATASOURCE_PASSWORD: "beacon"
      # Postgres is already initialised by postgres-init.sql, so the app must not re-run data.sql.
      SPRING_SQL_INIT_MODE: "never"
      # Set SLACK_WEBHOOK_URL here to deliver alerts to Slack; unset falls back to logging.
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
    depends_on:
      elasticsearch:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # --- Demo seeder (profile: demo) --------------------------------------------
  # `docker compose --profile demo up` brings the stack up already populated with realistic events
  # and immediately triggers an anomaly-scoring pass, so the dashboard at http://localhost:8082 is
  # alive on first load. This one-shot container exits after seeding.
  seed:
    image: curlimages/curl:8.8.0
    container_name: beacon-seed
    profiles: ["demo"]
    depends_on:
      ingest-service:
        condition: service_started
      query-api:
        condition: service_started
      anomaly-worker:
        condition: service_started
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["sh", "/scripts/demo-seed.sh"]
    environment:
      INGEST_URL: "http://ingest-service:8081"
      QUERY_URL: "http://query-api:8082"
      ANOMALY_URL: "http://anomaly-worker:8083"
