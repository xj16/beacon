name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast lane: compile everything and run the container-free unit tests.
  build:
    name: Build & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build and run unit tests
        run: ./gradlew build --no-daemon

      - name: Assemble boot jars
        run: ./gradlew bootJar --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: "**/build/reports/tests/test"
          if-no-files-found: ignore

  # Slow lane: Testcontainers integration tests against real Kafka + Elasticsearch.
  # GitHub-hosted ubuntu runners ship a working Docker daemon, so Testcontainers works out of the box.
  integration:
    name: Integration tests (Testcontainers)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Increase vm.max_map_count for Elasticsearch
        run: sudo sysctl -w vm.max_map_count=262144

      - name: Run integration tests
        run: ./gradlew integrationTest --no-daemon

      - name: Upload integration test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: "**/build/reports/tests/integrationTest"
          if-no-files-found: ignore
